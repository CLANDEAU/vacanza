<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Galerie des vacances</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5;}
h1{text-align:center;}
.gallery{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.photo-card{background:#fff;padding:5px;border-radius:5px;box-shadow:0 2px 5px rgba(0,0,0,0.1);width:200px;}
.photo-card img{width:100%;border-radius:5px;}
.uploader{text-align:center;font-size:12px;margin-top:5px;color:#555;}
#debug{margin-top:20px;padding:10px;background:#fff3cd;}
</style>
</head>
<body>

<h1>Galerie des vacances</h1>
<div class="gallery" id="gallery"></div>
<div id="debug">Chargement...</div>

<script>
// protection mot de passe
if(sessionStorage.getItem("auth") !== "true"){
  window.location.href="admin.html";
}

// Supabase
const supabaseUrl = "https://vvyujtzftcdbfkzvusbh.supabase.co";
const supabaseKey = "sb_publishable_nHB_OJQkdUlDht5716YXxA_mMcfFOLL"; // remplacez par votre ANON_KEY
const supabase = window.supabase.createClient(supabaseUrl,supabaseKey);

async function loadBucketPhotos(){
  const debug = document.getElementById("debug");
  const gallery = document.getElementById("gallery");

  try{
    // lister tous les fichiers du bucket "photo"
    const { data, error } = await supabase.storage.from('photo').list('');

    if(error){
      debug.innerText = "Erreur Supabase : " + error.message;
      return;
    }

    if(!data || data.length === 0){
      debug.innerText = "Aucune photo dans le bucket.";
      return;
    }

    debug.innerText = "Photos trouvées : " + data.length;
    gallery.innerHTML = "";

    data.forEach(file=>{
      // générer l'URL publique
      const url = supabase.storage.from('photo').getPublicUrl(file.name).data.publicUrl;

      const card = document.createElement("div");
      card.className = "photo-card";

      const img = document.createElement("img");
      img.src = url;
      img.alt = file.name;

      const uploader = document.createElement("div");
      uploader.className = "uploader";
      uploader.innerText = file.name;

      card.appendChild(img);
      card.appendChild(uploader);
      gallery.appendChild(card);
    });

  }catch(e){
    debug.innerText = "Erreur JS : " + e;
  }
}

loadBucketPhotos();
</script>

</body>
</html>
